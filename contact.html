<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos</title>
    <link rel="icon" type="image/png" href="./img/react_original_logo_icon_146374.ico">
    <link rel="stylesheet" href="./css/contact.css">
</head>

<body>
    <header>
        <nav>
            <a href="index.html">
                <button>Ínicio</button>
            </a>
            <a href="about.html">
                <button>Sobre nós</button>
            </a>
            <a href="services.html">

                <button>Nosso combo de aprendizado</button>
            </a>
        <a href="plans.html">
            <button>Conheça nossos planos de estudo</button>
        </a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Entre em contato</h2>

            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone">
                
                <label for="assunto">Assunto:</label>
                <select id="assunto" name="assunto">
                    <option value="">Selecione uma opção</option>
                    <option value="duvida">Dúvida</option>
                    <option value="inscricao">Inscrição</option>
                    <option value="suporte">Suporte</option>
                </select>

                <label for="satisfacao">Satisfação com a página</label>
                <input type="range" name="" id="satisfacao">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5"></textarea>

                <button type="submit">Enviar mensagem</button>
            </form>
        </section>
    </main>
    <footer>
        <iframe src="footer.html" frameborder="0" width="100%" height="100"></iframe>
    </footer>
</body>

</html>
